  <style>/* Facility19, Enterprise minimal system */
:root {
  --paper: #FAFAF8;
  --paper-2: #F3F3EF;
  --paper-3: #EDEDE8;
  --ink: #0A0A0B;
  --ink-2: #1A1A1D;
  --slate: #5E6472;
  --slate-2: #8A8F9C;
  --line: #E5E4DE;
  --line-2: #DAD8D0;
  --brand: #6B7BFF;
  --brand-ink: #3D4DDB;
  --brand-wash: #EEF0FF;
  --good: #1F8A5F;
  --warn: #C77A1F;
  --bad: #C0392B;

  --f-display: "Inter Tight", "Inter", -apple-system, system-ui, sans-serif;
  --f-sans: "Inter", -apple-system, system-ui, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --maxw: 1240px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body { overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
img { display: block; max-width: 100%; }

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

/* Type scale, enterprise, tight */
.display-xxl {
  font-family: var(--f-display);
  font-size: clamp(48px, 7.2vw, 104px);
  line-height: 0.96;
  letter-spacing: -0.035em;
  font-weight: 500;
}
.display-xl {
  font-family: var(--f-display);
  font-size: clamp(40px, 5.2vw, 72px);
  line-height: 1.0;
  letter-spacing: -0.03em;
  font-weight: 500;
}
.display-l {
  font-family: var(--f-display);
  font-size: clamp(32px, 3.6vw, 52px);
  line-height: 1.05;
  letter-spacing: -0.025em;
  font-weight: 500;
}
.display-m {
  font-family: var(--f-display);
  font-size: clamp(24px, 2.2vw, 32px);
  line-height: 1.15;
  letter-spacing: -0.018em;
  font-weight: 500;
}
.eyebrow {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--slate);
  font-weight: 500;
}
.lede {
  font-size: 19px;
  line-height: 1.5;
  color: var(--slate);
  max-width: 64ch;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  height: 46px;
  padding: 0 20px;
  border-radius: 8px;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.005em;
  transition: transform .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: var(--brand-ink); }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line-2);
}
.btn-ghost:hover { background: var(--paper-2); border-color: var(--ink); }
.btn-brand {
  background: var(--brand);
  color: white;
}
.btn-brand:hover { background: var(--brand-ink); }

.btn .arrow {
  transition: transform .2s ease;
}
.btn:hover .arrow { transform: translateX(3px); }

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250, 250, 248, 0.8);
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  border-bottom: 1px solid transparent;
  transition: border-color .2s ease;
}
.nav.scrolled { border-bottom-color: var(--line); }
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-mark {
  display: flex; align-items: baseline;
  font-family: var(--f-display);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.03em;
}
.nav-logo-mark .nineteen { color: var(--brand); }
.nav-links {
  display: flex; align-items: center; gap: 32px;
  font-size: 14px; color: var(--ink-2);
}
.nav-links a { transition: color .15s; }
.nav-links a:hover { color: var(--brand-ink); }
.nav-cta { display: flex; align-items: center; gap: 10px; }

/* Section */
section { position: relative; }
.section-head {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  max-width: 900px;
}
.section-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--slate);
}
.section-eyebrow::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-wash);
}

/* Dividers and lines */
.hair { height: 1px; background: var(--line); border: 0; }
.dotline {
  height: 1px;
  background-image: linear-gradient(to right, var(--line-2) 50%, transparent 0%);
  background-size: 6px 1px;
  background-repeat: repeat-x;
}

/* Card primitive */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
}

/* Pulse */
@keyframes pulseDot {
  0% { box-shadow: 0 0 0 0 rgba(31, 138, 95, 0.45); }
  70% { box-shadow: 0 0 0 8px rgba(31, 138, 95, 0); }
  100% { box-shadow: 0 0 0 0 rgba(31, 138, 95, 0); }
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--good);
  animation: pulseDot 1.8s infinite;
}

/* Marquee */
@keyframes marq { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.marquee { overflow: hidden; }
.marquee-track {
  display: flex; gap: 56px; white-space: nowrap;
  animation: marq 60s linear infinite;
}

/* Reveal on scroll */
.reveal { opacity: 0; transform: translateY(14px); transition: opacity .7s ease, transform .7s ease; }
.reveal.in { opacity: 1; transform: translateY(0); }

/* Utilities */
.mono { font-family: var(--f-mono); }
.txt-slate { color: var(--slate); }
.txt-brand { color: var(--brand-ink); }

/* Focus */
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }

/* ============================================================
   Mobile nav (hamburger + drawer)
   ============================================================ */
.nav-burger { display: none; width: 44px; height: 44px; align-items: center; justify-content: center; border-radius: 10px; margin-left: 8px; }
.nav-burger:hover { background: var(--paper-2); }
.nav-burger-icon { position: relative; width: 22px; height: 16px; display: inline-block; }
.nav-burger-icon span {
  position: absolute; left: 0; width: 100%; height: 2px; background: var(--ink);
  border-radius: 2px; transition: transform .25s ease, opacity .2s ease, top .25s ease;
}
.nav-burger-icon span:nth-child(1) { top: 2px; }
.nav-burger-icon span:nth-child(2) { top: 7px; }
.nav-burger-icon span:nth-child(3) { top: 12px; }
.nav-burger-icon.open span:nth-child(1) { top: 7px; transform: rotate(45deg); }
.nav-burger-icon.open span:nth-child(2) { opacity: 0; }
.nav-burger-icon.open span:nth-child(3) { top: 7px; transform: rotate(-45deg); }

.nav-mobile {
  position: fixed; inset: 68px 0 0 0;
  background: var(--paper);
  z-index: 49;
  opacity: 0; pointer-events: none; transform: translateY(-6px);
  transition: opacity .2s ease, transform .25s ease;
  overflow-y: auto;
  display: none;
}
.nav-mobile.show { opacity: 1; pointer-events: auto; transform: none; }
.nav-mobile-inner {
  display: flex; flex-direction: column; gap: 4px;
  padding: 24px 28px 40px;
  max-width: var(--maxw); margin: 0 auto;
}
.nav-mobile-inner a {
  font-family: var(--f-display);
  font-size: 28px; letter-spacing: -0.02em; font-weight: 500;
  color: var(--ink);
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.nav-mobile-ctas {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 28px;
}
.nav-mobile-ctas .btn { width: 100%; justify-content: center; height: 52px; font-size: 16px; }

/* ============================================================
   Tablet (≤ 1024px)
   ============================================================ */
@media (max-width: 1024px) {
  .wrap { padding: 0 24px; }

  /* Reduce vertical section padding */
  section[style*="padding: '120px 0'"],
  section[style*="padding: \"120px 0\""] { padding: 88px 0 !important; }
  section[style*="padding: '96px 0'"] { padding: 80px 0 !important; }

  footer .wrap[style*="gridTemplateColumns: '1.4fr 1fr 1fr 1fr'"] {

  /* Capabilities 5-col → 3-col */

  }

  /* Metrics 4-col → 2-col */

  }

  /* How it works 4-col → 2-col */

  /* Hero badges 3-col → stay 3, but compact */
  /* Nav CTAs shrink */

<script id="facility-nav-fallback">
  (function () {
    function q(root, sel) { return root ? root.querySelector(sel) : null; }
    function qa(root, sel) { return root ? Array.from(root.querySelectorAll(sel)) : []; }
    function isMobile() { return window.innerWidth <= 1024; }
    function ensureDrawer(nav) {
      var existing = q(document, '#facility-mobile-drawer');
      if (existing) return existing;
      var links = qa(nav, '.nav-links a');
      var ctas = qa(nav, '.nav-cta a');
      var drawer = document.createElement('div');
      drawer.id = 'facility-mobile-drawer';
      drawer.setAttribute('aria-hidden', 'true');
      drawer.style.cssText = [
        'position:fixed',
        'top:64px',
        'left:0',
        'right:0',
        'bottom:0',
        'z-index:10000',
        'background:var(--paper)',
        'padding:24px 28px 40px',
        'display:none',
        'opacity:0',
        'pointer-events:none',
        'overflow-y:auto',
        'transform:translateY(-6px)',
        'transition:opacity .2s ease, transform .25s ease'
      ].join(';');
      drawer.innerHTML =
        '<div class="facility-mobile-drawer-inner" style="display:flex;flex-direction:column;gap:4px;max-width:var(--maxw);margin:0 auto;"></div>';
      var inner = q(drawer, '.facility-mobile-drawer-inner');
      links.forEach(function (link) {
        var a = link.cloneNode(true);
        a.style.cssText = 'font-family:var(--f-display);font-size:28px;letter-spacing:-0.02em;font-weight:500;color:var(--ink);padding:14px 0;border-bottom:1px solid var(--line);text-decoration:none;';
        inner.appendChild(a);
      });
      var ctaWrap = document.createElement('div');
      ctaWrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-top:28px;';
      ctas.forEach(function (cta) {
        var a = cta.cloneNode(true);
        a.style.width = '100%';
        a.style.justifyContent = 'center';
        a.style.height = '52px';
        a.style.fontSize = '16px';
        ctaWrap.appendChild(a);
      });
      inner.appendChild(ctaWrap);
      document.body.appendChild(drawer);
      return drawer;
    }
    function setDrawerState(mobile, burger, icon, open) {
      var nav = burger ? burger.closest('.nav') : null;
      var drawer = nav ? ensureDrawer(nav) : null;
      mobile.classList.toggle('show', open);
      if (icon) icon.classList.toggle('open', open);
      burger.setAttribute('aria-expanded', String(open));
      document.body.style.overflow = open ? 'hidden' : '';
      if (drawer) {
        drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
        drawer.style.display = open ? 'block' : 'none';
        drawer.style.opacity = open ? '1' : '0';
        drawer.style.pointerEvents = open ? 'auto' : 'none';
        drawer.style.transform = open ? 'translateY(0)' : 'translateY(-6px)';
      }
    }
    function resetDrawerState(mobile, burger, icon) {
      var drawer = q(document, '#facility-mobile-drawer');
      mobile.classList.remove('show');
      if (icon) icon.classList.remove('open');
      burger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
      mobile.style.position = '';
      mobile.style.inset = '';
      mobile.style.top = '';
      mobile.style.zIndex = '';
      mobile.style.background = '';
      mobile.style.overflowY = '';
      mobile.style.display = '';
      if (drawer) {
        drawer.setAttribute('aria-hidden', 'true');
        drawer.style.display = 'none';
        drawer.style.opacity = '0';
        drawer.style.pointerEvents = 'none';
        drawer.style.transform = 'translateY(-6px)';
      }
    }

    function syncNavLayout() {
      qa(document, '.nav').forEach(function (nav) {
        var links = q(nav, '.nav-links');
        var cta = q(nav, '.nav-cta');
        var burger = q(nav, '.nav-burger');
        var mobile = q(nav, '.nav-mobile');
        var icon = q(burger, '.nav-burger-icon');
        if (!links || !cta || !burger || !mobile) return;

        if (isMobile()) {
          links.style.display = 'none';
          cta.style.display = 'none';
          burger.style.display = 'inline-flex';
          mobile.style.display = 'none';
          ensureDrawer(nav);
          var open = mobile.classList.contains('show') || burger.getAttribute('aria-expanded') === 'true';
          setDrawerState(mobile, burger, icon, open);
        } else {
          links.style.display = '';
          cta.style.display = '';
          burger.style.display = '';
          resetDrawerState(mobile, burger, icon);
        }
      });
    }

    function bindNavControls() {
      qa(document, '.nav').forEach(function (nav) {
        var burger = q(nav, '.nav-burger');
        var mobile = q(nav, '.nav-mobile');
        if (!burger || !mobile || burger.dataset.f19Bound === '1') return;
        var icon = q(burger, '.nav-burger-icon');
        ensureDrawer(nav);

        burger.dataset.f19Bound = '1';
        burger.addEventListener('click', function (ev) {
          if (!isMobile()) return;
          ev.preventDefault();
          ev.stopImmediatePropagation();
          ev.stopPropagation();
          var open = !mobile.classList.contains('show');
          setDrawerState(mobile, burger, icon, open);
        }, { passive: false, capture: true });

        document.addEventListener('click', function (ev) {
          var drawer = q(document, '#facility-mobile-drawer');
          if (!drawer || !isMobile()) return;
          if (!drawer.contains(ev.target) && !burger.contains(ev.target) && mobile.classList.contains('show')) {
            setDrawerState(mobile, burger, icon, false);
          }
        });

        qa(document, '#facility-mobile-drawer a').forEach(function (a) {
          a.addEventListener('click', function () {
            setDrawerState(mobile, burger, icon, false);
          });
        });
      });
    }

    function run() {
      syncNavLayout();
      bindNavControls();
    }

    document.addEventListener('DOMContentLoaded', run);
    window.addEventListener('resize', syncNavLayout, { passive: true });
    var mo = new MutationObserver(run);
    mo.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(run, 0);
  })();
